      </html>

---
apiVersion: v1
kind: Service
metadata:
  name: jala-arc-svc
  namespace: k8s-arc
spec:
  selector:
    app: jala-arc
  ports:
    - port: 8082
      targetPort: 8080
  type: ClusterIP