server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
